name: Build and deploy the JupyterLite site
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install JupyterLite
        run: pip install -r requirements.txt
      - name: Bundle the current foundation.py into the site content
        run: cp foundation.py FOUNDATION_TUTORIAL.md content/
      - name: Build the static site
        run: jupyter lite build --contents content --output-dir dist
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
